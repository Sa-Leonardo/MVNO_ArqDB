<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #64748b; }
      .card-title { font: 700 23px Arial, sans-serif; fill: #ffffff; }
      .section { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 14px Arial, sans-serif; fill: #475569; }
      .body-strong { font: 700 14px Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px Arial, sans-serif; fill: #64748b; }
      .tag { font: 700 12px Arial, sans-serif; fill: #475569; }
      .flow { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .return { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="980" fill="#f8fafc"/>
  <path d="M0 120 H1600" stroke="#e2e8f0"/>
  <text x="70" y="58" class="title">Arquitetura Geral do Sistema MVNO</text>
  <text x="70" y="91" class="subtitle">Fluxo entre usuário, frontend React, API Go em camadas e banco MongoDB</text>

  <!-- Main flow arrows -->
  <path class="flow" d="M235 440 H300"/>
  <path class="flow" d="M620 440 H730"/>
  <path class="flow" d="M1150 440 H1260"/>
  <path class="return" d="M1260 495 H1150"/>
  <path class="return" d="M730 495 H620"/>
  <path class="return" d="M300 495 H235"/>

  <!-- Arrow labels -->
  <g><rect x="245" y="401" width="45" height="25" rx="12" fill="#ffffff" stroke="#cbd5e1"/><text x="267" y="419" text-anchor="middle" class="tag">UI</text></g>
  <g><rect x="635" y="389" width="80" height="44" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="675" y="407" text-anchor="middle" class="tag">HTTP/JSON</text><text x="675" y="424" text-anchor="middle" class="small">Bearer JWT</text></g>
  <g><rect x="1164" y="397" width="82" height="36" rx="8" fill="#ffffff" stroke="#cbd5e1"/><text x="1205" y="420" text-anchor="middle" class="tag">Go Driver</text></g>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="55" y="330" width="180" height="255" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <circle cx="145" cy="394" r="34" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="145" cy="383" r="11" fill="#0284c7"/>
    <path d="M119 418 C124 395 166 395 171 418" fill="#0284c7"/>
    <text x="145" y="462" text-anchor="middle" class="section">Usuário</text>
    <text x="145" y="489" text-anchor="middle" class="body">Administrador</text>
    <text x="145" y="512" text-anchor="middle" class="body">Operador</text>
    <text x="145" y="535" text-anchor="middle" class="body">Visualizador</text>
    <rect x="89" y="551" width="112" height="24" rx="12" fill="#f1f5f9"/>
    <text x="145" y="568" text-anchor="middle" class="tag">Navegador web</text>
  </g>

  <!-- Frontend -->
  <g filter="url(#shadow)">
    <rect x="300" y="175" width="320" height="565" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M310 175 H610 A10 10 0 0 1 620 185 V232 H300 V185 A10 10 0 0 1 310 175" fill="#0369a1"/>
    <text x="325" y="211" class="card-title">Frontend</text>
    <rect x="510" y="190" width="85" height="25" rx="12" fill="#e0f2fe"/>
    <text x="552" y="207" text-anchor="middle" class="tag">porta 5173</text>

    <text x="325" y="272" class="section">React + TypeScript</text>
    <text x="325" y="297" class="body">Interface administrativa SPA</text>

    <rect x="325" y="325" width="270" height="78" rx="7" fill="#f0f9ff" stroke="#bae6fd"/>
    <text x="344" y="351" class="body-strong">Páginas e componentes</text>
    <text x="344" y="376" class="body">Dashboard, Clientes, Chips,</text>
    <text x="344" y="395" class="body">Planos, Usuários e Relatórios</text>

    <rect x="325" y="420" width="270" height="78" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="344" y="446" class="body-strong">Navegação e sessão</text>
    <text x="344" y="471" class="body">React Router, AuthContext</text>
    <text x="344" y="490" class="body">ProtectedRoute e RoleRoute</text>

    <rect x="325" y="515" width="270" height="78" rx="7" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="344" y="541" class="body-strong">Dados e comunicação</text>
    <text x="344" y="566" class="body">TanStack Query + Axios</text>
    <text x="344" y="585" class="body">Cache, consultas e mutações</text>

    <rect x="325" y="610" width="270" height="78" rx="7" fill="#fefce8" stroke="#fde68a"/>
    <text x="344" y="636" class="body-strong">Apresentação</text>
    <text x="344" y="661" class="body">Tailwind CSS, Recharts</text>
    <text x="344" y="680" class="body">Lucide Icons e feedbacks</text>

    <text x="460" y="719" text-anchor="middle" class="small">Vite encaminha /api e /auth para a API</text>
  </g>

  <!-- Backend -->
  <g filter="url(#shadow)">
    <rect x="730" y="130" width="420" height="655" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <path d="M740 130 H1140 A10 10 0 0 1 1150 140 V187 H730 V140 A10 10 0 0 1 740 130" fill="#0f766e"/>
    <text x="755" y="166" class="card-title">API Backend</text>
    <rect x="1032" y="145" width="92" height="25" rx="12" fill="#ccfbf1"/>
    <text x="1078" y="162" text-anchor="middle" class="tag">porta 8080</text>

    <text x="755" y="224" class="section">Go + Gin · API REST /api/v1</text>

    <rect x="755" y="250" width="370" height="79" rx="7" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="775" y="277" class="body-strong">1. Middleware</text>
    <text x="775" y="302" class="body">Autenticação JWT · RBAC por perfil</text>
    <text x="775" y="321" class="small">Auth e RequireRole</text>

    <path d="M940 329 V347" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="755" y="350" width="370" height="79" rx="7" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="775" y="377" class="body-strong">2. Handlers HTTP</text>
    <text x="775" y="402" class="body">AuthHandler · MVNOHandler</text>
    <text x="775" y="421" class="small">DTOs, validação e respostas JSON</text>

    <path d="M940 429 V447" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="755" y="450" width="370" height="79" rx="7" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="775" y="477" class="body-strong">3. Serviços de domínio</text>
    <text x="775" y="502" class="body">AuthService · MVNOService</text>
    <text x="775" y="521" class="small">Regras de negócio e auditoria</text>

    <path d="M940 529 V547" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="755" y="550" width="370" height="79" rx="7" fill="#faf5ff" stroke="#e9d5ff"/>
    <text x="775" y="577" class="body-strong">4. Repositórios</text>
    <text x="775" y="602" class="body">UserRepository · MVNORepository</text>
    <text x="775" y="621" class="small">Filtros BSON, índices e persistência</text>

    <path d="M940 629 V647" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="755" y="650" width="370" height="68" rx="7" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="775" y="677" class="body-strong">MongoDB Driver for Go</text>
    <text x="775" y="702" class="body">Conexão compartilhada e pool</text>

    <g>
      <rect x="755" y="738" width="176" height="29" rx="14" fill="#fef2f2" stroke="#fecaca"/>
      <text x="843" y="758" text-anchor="middle" class="tag">bcrypt · JWT</text>
      <rect x="949" y="738" width="176" height="29" rx="14" fill="#f1f5f9" stroke="#cbd5e1"/>
      <text x="1037" y="758" text-anchor="middle" class="tag">Zap · health check</text>
    </g>
  </g>

  <!-- MongoDB -->
  <g filter="url(#shadow)">
    <rect x="1260" y="195" width="285" height="545" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M1270 195 H1535 A10 10 0 0 1 1545 205 V252 H1260 V205 A10 10 0 0 1 1270 195" fill="#166534"/>
    <text x="1285" y="231" class="card-title">MongoDB</text>
    <rect x="1430" y="210" width="90" height="25" rx="12" fill="#dcfce7"/>
    <text x="1475" y="227" text-anchor="middle" class="tag">porta 27017</text>

    <!-- Database icon -->
    <ellipse cx="1402" cy="300" rx="64" ry="19" fill="#bbf7d0" stroke="#22c55e" stroke-width="2"/>
    <path d="M1338 300 V352 C1338 363 1367 372 1402 372 C1437 372 1466 363 1466 352 V300" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <ellipse cx="1402" cy="352" rx="64" ry="19" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="1402" y="336" text-anchor="middle" class="body-strong">mvno_db</text>

    <text x="1285" y="411" class="section">Coleções</text>
    <rect x="1285" y="433" width="108" height="34" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/><text x="1339" y="455" text-anchor="middle" class="body">clientes</text>
    <rect x="1410" y="433" width="108" height="34" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/><text x="1464" y="455" text-anchor="middle" class="body">chips</text>
    <rect x="1285" y="480" width="108" height="34" rx="6" fill="#eff6ff" stroke="#bfdbfe"/><text x="1339" y="502" text-anchor="middle" class="body">planos</text>
    <rect x="1410" y="480" width="108" height="34" rx="6" fill="#fff7ed" stroke="#fed7aa"/><text x="1464" y="502" text-anchor="middle" class="body">assinaturas</text>
    <rect x="1285" y="527" width="108" height="34" rx="6" fill="#fef2f2" stroke="#fecaca"/><text x="1339" y="549" text-anchor="middle" class="body">recargas</text>
    <rect x="1410" y="527" width="108" height="34" rx="6" fill="#faf5ff" stroke="#e9d5ff"/><text x="1464" y="549" text-anchor="middle" class="body">lotes</text>
    <rect x="1285" y="574" width="108" height="34" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/><text x="1339" y="596" text-anchor="middle" class="body">users</text>
    <rect x="1410" y="574" width="108" height="34" rx="6" fill="#faf5ff" stroke="#e9d5ff"/><text x="1464" y="596" text-anchor="middle" class="body">audit_logs</text>

    <text x="1402" y="649" text-anchor="middle" class="body-strong">Documentos BSON</text>
    <text x="1402" y="675" text-anchor="middle" class="small">Índices únicos e compostos</text>
    <text x="1402" y="698" text-anchor="middle" class="small">Referências + dados incorporados</text>
    <rect x="1347" y="712" width="110" height="23" rx="11" fill="#f0fdf4"/>
    <text x="1402" y="728" text-anchor="middle" class="tag">persistência</text>
  </g>

  <!-- Operational flow footer -->
  <rect x="70" y="840" width="1475" height="93" rx="8" fill="#ffffff" stroke="#dbe3ec"/>
  <text x="95" y="872" class="section">Fluxo de uma requisição</text>
  <g>
    <rect x="95" y="889" width="130" height="29" rx="14" fill="#e0f2fe"/><text x="160" y="909" text-anchor="middle" class="tag">1. Ação na tela</text>
    <text x="241" y="909" class="body-strong">→</text>
    <rect x="265" y="889" width="150" height="29" rx="14" fill="#f0f9ff"/><text x="340" y="909" text-anchor="middle" class="tag">2. Requisição HTTP</text>
    <text x="431" y="909" class="body-strong">→</text>
    <rect x="455" y="889" width="165" height="29" rx="14" fill="#fff7ed"/><text x="537" y="909" text-anchor="middle" class="tag">3. Auth e validação</text>
    <text x="636" y="909" class="body-strong">→</text>
    <rect x="660" y="889" width="165" height="29" rx="14" fill="#ecfdf5"/><text x="742" y="909" text-anchor="middle" class="tag">4. Regra de negócio</text>
    <text x="841" y="909" class="body-strong">→</text>
    <rect x="865" y="889" width="150" height="29" rx="14" fill="#faf5ff"/><text x="940" y="909" text-anchor="middle" class="tag">5. Consulta BSON</text>
    <text x="1031" y="909" class="body-strong">→</text>
    <rect x="1055" y="889" width="140" height="29" rx="14" fill="#dcfce7"/><text x="1125" y="909" text-anchor="middle" class="tag">6. MongoDB</text>
    <text x="1211" y="909" class="body-strong">→</text>
    <rect x="1235" y="889" width="190" height="29" rx="14" fill="#f1f5f9"/><text x="1330" y="909" text-anchor="middle" class="tag">7. Resposta para a interface</text>
  </g>

  <text x="70" y="962" class="small">Ambiente de desenvolvimento: navegador → localhost:5173 → localhost:8080 → localhost:27017</text>
  <text x="1535" y="962" text-anchor="end" class="small">Arquitetura atual do projeto MVNO_ArqDB</text>
</svg>
